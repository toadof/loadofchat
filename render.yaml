services:
  # Spring Boot backend (Web Service with Docker)
  - type: web
    name: loadofchat-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PORT
        value: 8080

  # React frontend (Static Site)
  - type: web
    name: loadofchat-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
